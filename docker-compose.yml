name: metricyak

services:
  db:
    image: postgres:17-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: metricyak
      POSTGRES_PASSWORD: metricyak
      POSTGRES_DB: metricyak
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - metricyak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: on-failure
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - metricyak-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: on-failure
    environment:
      CLICKHOUSE_USER: metricyak
      CLICKHOUSE_PASSWORD: metricyak
      CLICKHOUSE_DB: metricyak
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - metricyak-clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  # BREAKING CHANGE (was apache/kafka, image + volume renamed): if you have an existing
  # metricyak-kafka-data volume from before this change, `docker compose up` does NOT touch it —
  # it just becomes an orphaned, unreferenced volume, since `metricyak-redpanda-data` below starts
  # empty. Kafka's on-disk segment format isn't readable by Redpanda, so there is no automated
  # migration path for whatever was queued in it. Before pulling this change, either drain any
  # events you need (let the old stack's consumer catch up) or accept the loss, then remove the
  # stale volume explicitly — `docker compose down -v` will NOT catch it either, since it only
  # touches volumes currently declared here: `docker volume rm <project>_metricyak-kafka-data`.
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
    restart: on-failure
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      # external:// is host-reachable (used by the Node backend, which runs outside Docker via
      # `pnpm dev`); internal:// is docker-network-reachable (used by ClickHouse's Kafka Engine
      # table and kafka-ui, which run inside Docker). Same single broker, two advertised addresses —
      # see CLICKHOUSE_KAFKA_BROKERS in config.ts for why this split matters.
      - --advertise-kafka-addr internal://kafka:29092,external://localhost:9092
      - --rpc-addr kafka:33145
      - --advertise-rpc-addr kafka:33145
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --set redpanda.empty_seed_starts_cluster=false
      - --seeds kafka:33145
      - --set redpanda.auto_create_topics_enabled=true
    environment:
      ALLOW_PLAINTEXT_LISTENER: "true"
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
    volumes:
      - metricyak-redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9644/v1/status/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: metricyak
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "127.0.0.1:${KAFKA_UI_PORT:-8080}:8080"

volumes:
  metricyak-postgres-data:
  metricyak-redis-data:
  metricyak-clickhouse-data:
  metricyak-redpanda-data:
