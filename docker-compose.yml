name: metricyak

services:
  db:
    image: postgres:17-alpine
    restart: on-failure
    environment:
      POSTGRES_USER: metricyak
      POSTGRES_PASSWORD: metricyak
      POSTGRES_DB: metricyak
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - metricyak-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: on-failure
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - metricyak-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: on-failure
    environment:
      CLICKHOUSE_USER: metricyak
      CLICKHOUSE_PASSWORD: metricyak
      CLICKHOUSE_DB: metricyak
    ports:
      - "127.0.0.1:${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "127.0.0.1:${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - metricyak-clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  kafka:
    image: apache/kafka:3.9.0
    restart: on-failure
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # apache/kafka 3.9 combined broker+controller (KRaft) REQUIRES the CONTROLLER listener advertised —
      # without it StorageTool rejects the 0.0.0.0 controller bind and the broker crash-loops. Do not remove.
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092,CONTROLLER://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
    volumes:
      - metricyak-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    restart: on-failure
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: metricyak
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "127.0.0.1:${KAFKA_UI_PORT:-8080}:8080"

volumes:
  metricyak-postgres-data:
  metricyak-redis-data:
  metricyak-clickhouse-data:
  metricyak-kafka-data:
